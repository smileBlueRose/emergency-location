services:
  db:
    image: postgres:18
    container_name: emergency-location-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB__NAME}
      POSTGRES_USER: ${DB__USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password

secrets:
  db_password:
    file: secrets/db_password.txt
